name: Approve Submission → Generate Game PR

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: serial-generator
  cancel-in-progress: false

jobs:
  approve:
    if: |
      github.event.issue != null &&
      contains(github.event.comment.body, '!approve')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ----------------------------
      # Maintainer check
      # ----------------------------
      - name: Validate maintainer
        uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;

            const { data: collabs } = await github.rest.repos.listCollaborators({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const isMaintainer = collabs.some(u => u.login === commenter);

            if (!isMaintainer) {
              core.setFailed(`User ${commenter} is not a maintainer`);
            }

      # ----------------------------
      # Parse Issue Form properly
      # ----------------------------
      - name: Parse issue → JSON
        uses: actions/github-script@v7
        id: build
        with:
          script: |
            const fs = require("fs");

            const issue_number = context.payload.issue.number;

            const { data: issue } = await github.rest.issues.get({
              ...context.repo,
              issue_number
            });

            const body = issue.body || "";

            // =========================================================
            // 🔥 ISSUE FORM SECTION PARSER (FIXES YOUR BUGS)
            // =========================================================
            function parseSections(body) {
              const sections = {};
              const blocks = body.split(/\n###\s*/);

              for (const block of blocks) {
                const lines = block.split("\n");
                const title = lines[0]?.replace(/\*/g, "").trim();
                const value = lines.slice(1).join("\n").trim();

                if (title) sections[title] = value;
              }

              return sections;
            }

            const sections = parseSections(body);

            // ---------------- helpers ----------------
            function list(label) {
              const raw = sections[label];
              if (!raw) return [];
              return raw
                .split("\n")
                .map(l => l.replace(/^- /, "").trim())
                .filter(Boolean);
            }

            function normaliseKey(str) {
              return str
                .toLowerCase()
                .replace(/\s+/g, "_")
                .replace(/-/g, "_")
                .replace(/[^a-z0-9_]/g, "");
            }

            function parseEmulators(text) {
              if (!text) return {};

              const out = {};
              for (const line of text.split("\n")) {
                const [k, v] = line.split(":");
                if (!k || !v) continue;
                out[normaliseKey(k.trim())] = v.trim();
              }
              return out;
            }

            function parseCredits(text) {
              if (!text) return {};

              const out = {};
              for (const line of text.split("\n")) {
                const [role, people] = line.split(":");
                if (!role || !people) continue;

                out[normaliseKey(role)] = people
                  .split(",")
                  .map(p => p.trim())
                  .filter(Boolean);
              }
              return out;
            }

            function parseHardware(text) {
              if (!text) return { hardware_tested: false, hardware_notes: "" };

              return {
                hardware_tested: true,
                hardware_notes: text.trim()
              };
            }

            function checkboxes(text) {
              if (!text) return [];

              return text
                .split("\n")
                .map(l => l.replace(/^- \[.\]\s*/, "").trim())
                .filter(Boolean);
            }

            // ---------------- required fields ----------------
            const title = sections["Game Title"] || sections["Game Title *"];

            if (!title) {
              core.setFailed("Missing Game Title (Issue Form parsing failed)");
            }

            // ---------------- collision-safe serial ----------------
            if (!fs.existsSync("games")) fs.mkdirSync("games");

            const files = fs.readdirSync("games");

            const nums = files
              .map(f => f.match(/PSXD-(\d+)/))
              .filter(Boolean)
              .map(m => parseInt(m[1], 10));

            const next = (nums.length ? Math.max(...nums) : 0) + 1;
            const serial = `PSXD-${String(next).padStart(4, "0")}`;

            // ---------------- hardware ----------------
            const hw = parseHardware(sections["Hardware Tested"]);

            // ---------------- build JSON ----------------
            const json = {
              serial,
              title,
              slug: title.toLowerCase().replace(/[^a-z0-9]+/g, "-"),
              developer: sections["Developer / Team Name"] || "",
              publisher: sections["Developer / Team Name"] || "",
              year: Number(sections["Release Year"]),
              genre: list("Primary Genre"),
              players: sections["Player Count"] || "1",
              status: sections["Release Status"],
              description: sections["Game Description"],
              download_url: sections["Download URL"],
              source_url: sections["Source Code URL"] || "",

              disc_image_format: checkboxes(
                sections["Available disc image formats"]
              ),

              emulator_compatibility: parseEmulators(
                sections["Emulator Compatibility"]
              ),

              hardware_tested: hw.hardware_tested,
              hardware_notes: hw.hardware_notes,

              credits: parseCredits(sections["Credits"]),

              links: {
                website: sections["Website / itch.io / Discord"] || ""
              },

              screenshots: [],
              boxart: {},
              tags: [],

              submitted_by: issue.user.login,
              submission_date: new Date().toISOString().split("T")[0],
              last_updated: new Date().toISOString().split("T")[0]
            };

            const path = `games/${serial}.json`;
            fs.writeFileSync(path, JSON.stringify(json, null, 2));

            core.setOutput("serial", serial);
            core.setOutput("file", path);

      # ----------------------------
      # Create PR
      # ----------------------------
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: submission/${{ steps.build.outputs.serial }}
          title: "New Game Submission: ${{ steps.build.outputs.serial }}"
          body: |
            Auto-generated submission.

            **Serial:** ${{ steps.build.outputs.serial }}

            Closes #${{ github.event.issue.number }}

      # ----------------------------
      # Comment back on issue
      # ----------------------------
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const serial = "${{ steps.build.outputs.serial }}";

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `✅ Approved and processed as **${serial}**.\n\nA pull request has been created for review.`
            });
