name: "Submit a Homebrew Game"
description: "Submit your PS1 homebrew game to the PlayStation Homebrew Database"
title: "[SUBMISSION] Your Game Title Here"
labels: ["submission", "pending-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## Welcome to the PlayStation Homebrew Database!

        Please fill out this form carefully. All fields marked * are required.
        A maintainer will review your submission and assign you a **PSXD serial number**.

        > **Serial format:** `PSXD-XXXX` — e.g. `PSXD-0042`

  - type: input
    id: title
    attributes:
      label: "Game Title *"
      placeholder: "e.g. Crypts of Karanor"
    validations:
      required: true

  - type: input
    id: developer
    attributes:
      label: "Developer / Team Name *"
      placeholder: "e.g. RetroForge Dev"
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: "Release Year *"
      placeholder: "e.g. 2024"
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: "Release Status *"
      options:
        - "Complete"
        - "Demo"
        - "Beta"
        - "Work In Progress"
        - "Cancelled"
    validations:
      required: true

  - type: checkboxes
    id: region
    attributes:
      label: "Region *"
      description: "Which regions is this release intended for?"
      options:
        - label: "NTSC-U (North America)"
          required: false
        - label: "NTSC-J (Japan)"
          required: false
        - label: "PAL (Europe / Australia)"
          required: false
        - label: "Worldwide"
          required: false
    validations:
      required: true

  - type: dropdown
    id: genre
    attributes:
      label: "Primary Genre *"
      multiple: true
      options:
        - "Action"
        - "Adventure"
        - "Arcade"
        - "Beat 'em Up"
        - "Fighting"
        - "Horror"
        - "Platformer"
        - "Puzzle"
        - "Racing"
        - "RPG"
        - "Shoot 'em Up"
        - "Simulation"
        - "Sports"
        - "Strategy"
        - "Other"
    validations:
      required: true

  - type: input
    id: players
    attributes:
      label: "Player Count"
      placeholder: "e.g. 1, 1-2, 1-4"

  - type: textarea
    id: description
    attributes:
      label: "Game Description *"
      description: "A short description of your game (2-5 sentences)"
      placeholder: "Describe your game..."
    validations:
      required: true

  - type: input
    id: download_url
    attributes:
      label: "Download URL *"
      description: "Link to where the game can be downloaded (GitHub releases, itch.io, etc.)"
      placeholder: "https://..."
    validations:
      required: true

  - type: input
    id: trailer_url
    attributes:
      label: "Trailer URL"
      description: "YouTube link to a trailer or gameplay video, if you have one"
      placeholder: "https://www.youtube.com/watch?v=..."

  - type: input
    id: source_url
    attributes:
      label: "Source Code URL"
      description: "Link to source code, if public"
      placeholder: "https://github.com/..."

  - type: checkboxes
    id: formats
    attributes:
      label: "Available disc image formats"
      options:
        - label: "BIN/CUE"
        - label: "ISO"
        - label: "PBP (PSP/Vita)"
        - label: "CHD"

  - type: textarea
    id: emulator_compat
    attributes:
      label: "Emulator Compatibility"
      description: "List any emulators tested and how well the game runs"
      placeholder: |
        DuckStation: Perfect
        RetroArch (Beetle PSX): Good
        ePSXe: Untested

  - type: input
    id: hardware_tested
    attributes:
      label: "Hardware Tested?"
      description: "If tested on real hardware, which console model?"
      placeholder: "e.g. SCPH-7502 (PAL), SCPH-1001 (NTSC-U)"

  - type: markdown
    attributes:
      value: |
        ## Artwork

        Drag and drop images directly into each field below. GitHub will upload them and insert a link automatically.
        PNG or JPG only. Do not submit artwork derived from Sony's trade dress or copyrighted assets.

  - type: textarea
    id: artwork_boxart
    attributes:
      label: "Box Art"
      description: "Front cover required. Back and spine optional. Recommended size: 750×1050px (jewel case)."
      placeholder: |
        Drag and drop your box art images here.

        Front cover: 
        Back cover: 
        Spine:

  - type: textarea
    id: artwork_disc
    attributes:
      label: "Disc Art"
      description: "Optional but encouraged. Recommended size: 512×512px, circular design."
      placeholder: |
        Drag and drop your disc art image here.

  - type: textarea
    id: artwork_screenshots
    attributes:
      label: "Screenshots"
      description: "At least 1 required. Recommended: 1024×768px, or native PS1 resolution (320×240px). In-game screenshots only, no title screen spam."
      placeholder: |
        Drag and drop your screenshots here. Add as many as you like.

  - type: textarea
    id: credits
    attributes:
      label: "Credits"
      description: "Who worked on the game?"
      placeholder: |
        Programming: Jane Doe
        Art: John Smith
        Music: DJ RetroWave
        Testing: NekoPS1

  - type: input
    id: website
    attributes:
      label: "Website / itch.io / Discord"
      placeholder: "https://..."

  - type: checkboxes
    id: agreement
    attributes:
      label: "Submission Agreement *"
      options:
        - label: "This is an original homebrew game, not a pirated or commercially licensed title."
          required: true
        - label: "I have the right to submit this game and its associated artwork."
          required: true
        - label: "I agree to the database's submission guidelines."
          required: true
